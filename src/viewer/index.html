<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gitView</title>
  <link rel="stylesheet" href="style/output.css">
  <script src="lib/lucide.min.js"></script>
  <script type="module" src="/jsEngine/main.js"></script>
</head>

<body class="bg-theme-bg text-theme-text font-mono transition-colors duration-200">
  <!-- Fullscreen Canvas Container -->
  <div class="h-dvh w-full relative">
    <canvas id="graph-canvas" class="block absolute inset-0"></canvas>

    <!-- Controls Overlay -->
    <div
      class="absolute top-4 left-4 bg-theme-panel/90 px-3 py-2 rounded-lg text-xs text-theme-muted space-y-1 z-10 border border-theme-border shadow-sm backdrop-blur-sm">
      <div>
        <span>Scroll: Zoom</span>
        <span class="mx-2 text-theme-dim">|</span>
        <span>Drag: Pan</span>
        <span class="mx-2 text-theme-dim">|</span>
        <span>Click: Select</span>
      </div>
      <div class="text-theme-dim">
        <span>R: Latest on branch</span>
        <span class="mx-2">|</span>
        <span>M: Toggle messages</span>
        <span class="mx-2">|</span>
        <span>Esc: Close</span>
      </div>
    </div>

    <!-- Toggle Buttons -->
    <div class="absolute top-4 right-4 flex gap-2 z-10">
      <button id="toggle-theme"
        class="bg-theme-panel/90 p-2 rounded-lg text-theme-muted hover:bg-theme-border border border-theme-border transition-colors shadow-sm backdrop-blur-sm"
        aria-label="Toggle theme">
        <i data-lucide="sun" class="size-4 hidden dark:block"></i>
        <i data-lucide="moon" class="size-4 block dark:hidden"></i>
      </button>
      <button id="toggle-messages"
        class="bg-theme-panel/90 px-3 py-2 rounded-lg text-xs text-theme-muted hover:bg-theme-border border border-theme-border transition-colors shadow-sm backdrop-blur-sm font-semibold"
        aria-label="Toggle commit messages">
        Messages: ON
      </button>
    </div>

    <!-- Empty State -->
    <div id="empty-state"
      class="absolute inset-0 flex items-center justify-center hidden z-10 bg-theme-bg/80 backdrop-blur-sm">
      <div class="text-center bg-theme-panel p-8 rounded-xl border border-theme-border shadow-lg">
        <i data-lucide="git-branch" class="size-12 mx-auto text-theme-dim mb-4"></i>
        <p class="text-theme-text font-semibold text-lg">No commits found</p>
        <p class="text-theme-muted text-sm mt-2 max-w-xs">Make sure you're running this in a valid git repository with
          at least one commit.</p>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loading-state" class="absolute inset-0 flex items-center justify-center bg-theme-bg z-20">
      <div class="text-center">
        <div class="size-8 border-2 border-theme-border border-t-theme-blue rounded-full mx-auto spin"></div>
        <p class="text-theme-muted mt-4 font-medium animate-pulse">Loading repository...</p>
      </div>
    </div>

    <!-- Overlay backdrop (click to close) -->
    <div id="panel-backdrop" class="fixed inset-0 bg-black/50 z-20 hidden backdrop-blur-sm fade">
    </div>

    <!-- Detail Panel (overlay modal) -->
    <div id="detail-panel"
      class="fixed top-0 right-0 h-dvh w-96 bg-theme-panel border-l border-theme-border flex flex-col z-30 translate-x-full shadow-2xl transition-transform duration-200 ease-out">
      <!-- Header -->
      <div class="flex items-center justify-between p-4 border-b border-theme-border">
        <h2 class="text-sm font-semibold text-theme-text flex items-center gap-2">
          <i data-lucide="git-commit-horizontal" class="size-4 text-theme-blue"></i>
          Commit Details
        </h2>
        <button id="close-panel"
          class="size-7 flex items-center justify-center rounded hover:bg-theme-border text-theme-muted transition-colors"
          aria-label="Close panel">
          <i data-lucide="x" class="size-4"></i>
        </button>
      </div>

      <!-- Tabs -->
      <div class="flex gap-1 px-4 pt-3 border-b border-theme-border/50 pb-2">
        <button id="tab-details"
          class="px-3 py-1.5 text-xs rounded-md bg-theme-blue text-white font-semibold transition-colors">Details</button>
        <button id="tab-commands"
          class="px-3 py-1.5 text-xs rounded-md text-theme-muted hover:text-theme-text hover:bg-theme-border/50 font-medium transition-colors">Commands</button>
      </div>

      <!-- Content -->
      <div class="flex-1 overflow-y-auto p-4">
        <div id="detail-content" class="space-y-5">
          <!-- Commit Hash -->
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <span class="text-[10px] font-bold text-theme-dim uppercase tracking-wider">Hash</span>
              <button id="copy-hash"
                class="size-7 inline-flex items-center justify-center rounded hover:bg-theme-border text-theme-muted flex-shrink-0 transition-colors"
                type="button" aria-label="Copy hash">
                <i data-lucide="copy" class="size-3.5"></i>
              </button>
            </div>
            <p id="detail-hash"
              class="text-theme-yellow font-mono text-xs bg-theme-bg p-2 rounded border border-theme-border/50 break-all">
            </p>
          </div>

          <!-- Message -->
          <div>
            <span class="text-[10px] font-bold text-theme-dim uppercase tracking-wider mb-1.5 block">Message</span>
            <p id="detail-message" class="text-theme-text text-sm whitespace-pre-wrap leading-relaxed"></p>
          </div>

          <!-- Author -->
          <div>
            <span class="text-[10px] font-bold text-theme-dim uppercase tracking-wider mb-1.5 block">Author</span>
            <div class="flex items-center gap-2">
              <div class="size-6 rounded-full bg-theme-blue/20 flex items-center justify-center">
                <i data-lucide="user" class="size-3 text-theme-blue"></i>
              </div>
              <p id="detail-author" class="text-theme-blue text-sm font-medium"></p>
            </div>
          </div>

          <!-- Date -->
          <div>
            <span class="text-[10px] font-bold text-theme-dim uppercase tracking-wider mb-1.5 block">Date</span>
            <div class="flex items-center gap-2">
              <i data-lucide="clock" class="size-3.5 text-theme-muted"></i>
              <p id="detail-date" class="text-theme-muted text-sm"></p>
            </div>
          </div>

          <!-- Files Changed -->
          <div>
            <span
              class="text-[10px] font-bold text-theme-dim uppercase tracking-wider mb-1.5 block flex items-center justify-between">
              Files Changed
              <span id="files-count"
                class="bg-theme-border text-theme-text px-1.5 py-0.5 rounded-full text-[9px]">0</span>
            </span>
            <div id="detail-files"
              class="mt-2 max-h-64 overflow-y-auto space-y-1 bg-theme-bg rounded-lg p-2 border border-theme-border/50">
            </div>
          </div>
        </div>

        <div id="commands-content" class="space-y-4 hidden">
          <div id="detail-commands" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    lucide.createIcons();

    // Theme toggle logic
    const themeBtn = document.getElementById('toggle-theme');
    const html = document.documentElement;

    // Check local storage or default to dark
    if (localStorage.theme === 'light') {
      html.classList.remove('dark');
    }

    themeBtn.addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
      // Dispatch event so canvas can redraw with new colors
      window.dispatchEvent(new Event('theme-changed'));
    });
  </script>
</body>

</html>
