<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gitView</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/app.js" defer></script>
</head>

<body class="bg-zinc-900 text-zinc-100 font-mono">
  <!-- Fullscreen Canvas Container -->
  <div class="h-dvh w-full relative">
    <canvas id="graph-canvas" class="block absolute inset-0"></canvas>

    <!-- Controls Overlay -->
    <div class="absolute top-4 left-4 bg-zinc-800/90 px-3 py-2 rounded-lg text-xs text-zinc-400 space-y-1 z-10">
      <div>
        <span>Scroll: Zoom</span>
        <span class="mx-2">|</span>
        <span>Drag: Pan</span>
        <span class="mx-2">|</span>
        <span>Click: Select</span>
      </div>
      <div class="text-zinc-500">
        <span>R: Latest on lane</span>
        <span class="mx-2">|</span>
        <span>M: Toggle messages</span>
        <span class="mx-2">|</span>
        <span>Esc: Close</span>
      </div>
    </div>

    <!-- Toggle Button -->
    <div class="absolute top-4 right-4 flex gap-2 z-10">
      <button id="toggle-messages" class="bg-zinc-800/90 px-3 py-2 rounded-lg text-xs text-zinc-400 hover:bg-zinc-700"
        aria-label="Toggle commit messages">
        Messages: ON
      </button>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="absolute inset-0 flex items-center justify-center hidden z-10">
      <div class="text-center">
        <p class="text-zinc-400 text-lg">No commits found</p>
        <p class="text-zinc-500 text-sm mt-2">Make sure you're running this in a git repository</p>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loading-state" class="absolute inset-0 flex items-center justify-center bg-zinc-900 z-10">
      <div class="text-center">
        <div class="size-8 border-2 border-zinc-600 border-t-zinc-300 rounded-full mx-auto"
          style="animation: spin 1s linear infinite;"></div>
        <p class="text-zinc-400 mt-4">Loading repository...</p>
      </div>
    </div>

    <!-- Overlay backdrop (click to close) -->
    <div id="panel-backdrop" class="fixed inset-0 bg-black/50 z-20 hidden" style="transition: opacity 150ms ease-out;">
    </div>

    <!-- Detail Panel (overlay modal) -->
    <div id="detail-panel"
      class="fixed top-0 right-0 h-dvh w-80 bg-zinc-800 border-l border-zinc-700 flex flex-col z-30 translate-x-full"
      style="transition: transform 150ms ease-out;">
      <!-- Header -->
      <div class="flex items-center justify-between p-4 border-b border-zinc-700">
        <h2 class="text-sm font-semibold text-zinc-300">Commit Details</h2>
        <button id="close-panel" class="size-6 flex items-center justify-center rounded hover:bg-zinc-700 text-zinc-400"
          aria-label="Close panel">
          <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Content -->
      <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- Commit Hash -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Hash</span>
          <p id="detail-hash" class="text-amber-400 font-mono text-sm mt-1 break-all"></p>
        </div>

        <!-- Message -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Message</span>
          <p id="detail-message" class="text-zinc-200 text-sm mt-1 whitespace-pre-wrap"></p>
        </div>

        <!-- Author -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Author</span>
          <p id="detail-author" class="text-zinc-300 text-sm mt-1"></p>
        </div>

        <!-- Date -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Date</span>
          <p id="detail-date" class="text-zinc-400 text-sm mt-1"></p>
        </div>

        <!-- Files Changed -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Files Changed</span>
          <div id="detail-files" class="mt-2 max-h-64 overflow-y-auto space-y-1"></div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
