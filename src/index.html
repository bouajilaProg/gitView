<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gitView</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body class="bg-zinc-900 text-zinc-100 font-mono">
  <!-- Fullscreen Canvas Container -->
  <div class="h-dvh w-full relative">
    <canvas id="graph-canvas" class="block absolute inset-0"></canvas>
    
    <!-- Controls Overlay -->
    <div class="absolute top-4 left-4 bg-zinc-800/90 px-3 py-2 rounded-lg text-xs text-zinc-400 space-y-1 z-10">
      <div>
        <span>Scroll: Zoom</span>
        <span class="mx-2">|</span>
        <span>Drag: Pan</span>
        <span class="mx-2">|</span>
        <span>Click: Select</span>
      </div>
      <div class="text-zinc-500">
        <span>R: Reset</span>
        <span class="mx-2">|</span>
        <span>M: Toggle messages</span>
        <span class="mx-2">|</span>
        <span>Esc: Close</span>
      </div>
    </div>

    <!-- Toggle Button -->
    <div class="absolute top-4 right-4 flex gap-2 z-10">
      <button 
        id="toggle-messages" 
        class="bg-zinc-800/90 px-3 py-2 rounded-lg text-xs text-zinc-400 hover:bg-zinc-700"
        aria-label="Toggle commit messages"
      >
        Messages: ON
      </button>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="absolute inset-0 flex items-center justify-center hidden z-10">
      <div class="text-center">
        <p class="text-zinc-400 text-lg">No commits found</p>
        <p class="text-zinc-500 text-sm mt-2">Make sure you're running this in a git repository</p>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loading-state" class="absolute inset-0 flex items-center justify-center bg-zinc-900 z-10">
      <div class="text-center">
        <div class="size-8 border-2 border-zinc-600 border-t-zinc-300 rounded-full mx-auto" style="animation: spin 1s linear infinite;"></div>
        <p class="text-zinc-400 mt-4">Loading repository...</p>
      </div>
    </div>

    <!-- Overlay backdrop (click to close) -->
    <div id="panel-backdrop" class="fixed inset-0 bg-black/50 z-20 hidden" style="transition: opacity 150ms ease-out;"></div>

    <!-- Detail Panel (overlay modal) -->
    <div id="detail-panel" class="fixed top-0 right-0 h-dvh w-80 bg-zinc-800 border-l border-zinc-700 flex flex-col z-30 translate-x-full" style="transition: transform 150ms ease-out;">
      <!-- Header -->
      <div class="flex items-center justify-between p-4 border-b border-zinc-700">
        <h2 class="text-sm font-semibold text-zinc-300">Commit Details</h2>
        <button 
          id="close-panel" 
          class="size-6 flex items-center justify-center rounded hover:bg-zinc-700 text-zinc-400"
          aria-label="Close panel"
        >
          <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Content -->
      <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- Commit Hash -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Hash</span>
          <p id="detail-hash" class="text-amber-400 font-mono text-sm mt-1"></p>
        </div>

        <!-- Message -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Message</span>
          <p id="detail-message" class="text-zinc-200 text-sm mt-1 whitespace-pre-wrap"></p>
        </div>

        <!-- Author -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Author</span>
          <p id="detail-author" class="text-zinc-300 text-sm mt-1"></p>
        </div>

        <!-- Date -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Date</span>
          <p id="detail-date" class="text-zinc-400 text-sm mt-1"></p>
        </div>

        <!-- Files Changed -->
        <div>
          <span class="text-xs text-zinc-500 uppercase tracking-wide">Files Changed</span>
          <div id="detail-files" class="mt-2 max-h-64 overflow-y-auto space-y-1"></div>
        </div>
      </div>
    </div>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script>
    // Constants - HORIZONTAL layout
    const NODE_RADIUS = 20;
    const LANE_HEIGHT = 80;  // Vertical spacing between branches (lanes)
    const COLUMN_WIDTH = 120; // Horizontal spacing between commits
    const HIT_RADIUS = 25;

    // Branch colors - each lane gets consistent color
    const LANE_COLORS = [
      '#22c55e', // green-500
      '#3b82f6', // blue-500
      '#f59e0b', // amber-500
      '#ec4899', // pink-500
      '#8b5cf6', // violet-500
      '#06b6d4', // cyan-500
      '#f97316', // orange-500
      '#84cc16', // lime-500
    ];

    // State
    let graphData = { nodes: [], edges: [] };
    let selectedNode = null;
    let showMessages = true;

    // Camera object for zoom/pan
    const camera = {
      x: 50,
      y: 100,
      scale: 1,
      minScale: 0.2,
      maxScale: 3
    };

    // Canvas setup
    const canvas = document.getElementById('graph-canvas');
    const ctx = canvas.getContext('2d');

    // UI Elements
    const detailPanel = document.getElementById('detail-panel');
    const panelBackdrop = document.getElementById('panel-backdrop');
    const loadingState = document.getElementById('loading-state');
    const emptyState = document.getElementById('empty-state');
    const closeBtn = document.getElementById('close-panel');
    const toggleMessagesBtn = document.getElementById('toggle-messages');

    // Resize handler
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      render();
    }

    // Initialize
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Toggle messages
    toggleMessagesBtn.addEventListener('click', () => {
      showMessages = !showMessages;
      toggleMessagesBtn.textContent = `Messages: ${showMessages ? 'ON' : 'OFF'}`;
      render();
    });

    // Fetch graph data
    async function fetchGraph() {
      try {
        const response = await fetch('/api/graph');
        const data = await response.json();
        
        loadingState.classList.add('hidden');
        
        if (data.error) {
          emptyState.querySelector('p').textContent = data.error;
          emptyState.classList.remove('hidden');
          return;
        }

        if (!data.nodes || data.nodes.length === 0) {
          emptyState.classList.remove('hidden');
          return;
        }

        graphData = data;
        render();
      } catch (err) {
        loadingState.classList.add('hidden');
        emptyState.querySelector('p').textContent = 'Failed to load repository';
        emptyState.classList.remove('hidden');
        console.error('Failed to fetch graph:', err);
      }
    }

    // Get node position - HORIZONTAL layout
    // Oldest commits on RIGHT, newest on LEFT
    // X = (total - index) * spacing (reversed)
    // Y = lane (branch)
    function getNodePosition(node, index) {
      const totalNodes = graphData.nodes.length;
      return {
        x: (totalNodes - 1 - index) * COLUMN_WIDTH,
        y: node.lane * LANE_HEIGHT
      };
    }

    // Transform world coordinates to screen coordinates
    function worldToScreen(x, y) {
      return {
        x: (x + camera.x) * camera.scale,
        y: (y + camera.y) * camera.scale
      };
    }

    // Transform screen coordinates to world coordinates
    function screenToWorld(x, y) {
      return {
        x: x / camera.scale - camera.x,
        y: y / camera.scale - camera.y
      };
    }

    // Get lane color - consistent per branch
    function getLaneColor(lane) {
      return LANE_COLORS[lane % LANE_COLORS.length];
    }

    // Draw horizontal line between two points with curves for lane changes
    function drawEdge(source, target, sourceIndex, targetIndex) {
      const start = getNodePosition(source, sourceIndex);
      const end = getNodePosition(target, targetIndex);
      
      const startScreen = worldToScreen(start.x, start.y);
      const endScreen = worldToScreen(end.x, end.y);

      ctx.beginPath();
      ctx.moveTo(startScreen.x, startScreen.y);
      
      if (start.y === end.y) {
        // Same lane - straight horizontal line
        ctx.lineTo(endScreen.x, endScreen.y);
      } else {
        // Different lanes - use bezier curve
        const midX = (startScreen.x + endScreen.x) / 2;
        ctx.bezierCurveTo(
          midX, startScreen.y,
          midX, endScreen.y,
          endScreen.x, endScreen.y
        );
      }
      
      ctx.strokeStyle = getLaneColor(source.lane);
      ctx.lineWidth = 3 * camera.scale;
      ctx.stroke();
    }

    // Draw commit node with hash inside
    function drawNode(node, index) {
      const pos = getNodePosition(node, index);
      const screen = worldToScreen(pos.x, pos.y);
      const radius = NODE_RADIUS * camera.scale;
      const color = getLaneColor(node.lane);

      // Draw circle
      ctx.beginPath();
      ctx.arc(screen.x, screen.y, radius, 0, Math.PI * 2);
      
      if (selectedNode && selectedNode.id === node.id) {
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = color;
        ctx.lineWidth = 4 * camera.scale;
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#18181b';
        ctx.lineWidth = 2 * camera.scale;
        ctx.stroke();
      }

      // Draw hash inside circle
      if (camera.scale > 0.4) {
        const hashColor = selectedNode && selectedNode.id === node.id ? '#18181b' : '#ffffff';
        ctx.fillStyle = hashColor;
        ctx.font = `bold ${Math.max(8, 10 * camera.scale)}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.id.substring(0, 4), screen.x, screen.y);
      }

      // Draw commit message below
      if (showMessages && camera.scale > 0.5) {
        const message = node.message.split('\n')[0];
        const truncated = message.length > 20 ? message.substring(0, 20) + '...' : message;
        ctx.fillStyle = '#a1a1aa';
        ctx.font = `${Math.max(8, 9 * camera.scale)}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(truncated, screen.x, screen.y + radius + 8 * camera.scale);
      }
    }

    // Draw branch lane lines (horizontal guidelines)
    function drawLaneLines() {
      if (graphData.nodes.length === 0) return;
      
      // Find unique lanes
      const lanes = [...new Set(graphData.nodes.map(n => n.lane))].sort((a, b) => a - b);
      
      // Get horizontal extent
      const maxIndex = graphData.nodes.length - 1;
      const startX = -50;
      const endX = maxIndex * COLUMN_WIDTH + 50;
      
      lanes.forEach(lane => {
        const y = lane * LANE_HEIGHT;
        const startScreen = worldToScreen(startX, y);
        const endScreen = worldToScreen(endX, y);
        
        ctx.beginPath();
        ctx.moveTo(startScreen.x, startScreen.y);
        ctx.lineTo(endScreen.x, endScreen.y);
        ctx.strokeStyle = getLaneColor(lane) + '33'; // 20% opacity
        ctx.lineWidth = 2 * camera.scale;
        ctx.setLineDash([5 * camera.scale, 5 * camera.scale]);
        ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    // Main render function
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (graphData.nodes.length === 0) return;

      // Build node index map
      const nodeIndexMap = {};
      graphData.nodes.forEach((node, i) => {
        nodeIndexMap[node.id] = i;
      });

      // Draw lane guidelines first
      drawLaneLines();

      // Draw edges
      graphData.edges.forEach(edge => {
        const sourceIndex = nodeIndexMap[edge.source];
        const targetIndex = nodeIndexMap[edge.target];
        
        if (sourceIndex !== undefined && targetIndex !== undefined) {
          const source = graphData.nodes[sourceIndex];
          const target = graphData.nodes[targetIndex];
          drawEdge(source, target, sourceIndex, targetIndex);
        }
      });

      // Draw nodes on top
      graphData.nodes.forEach((node, index) => {
        drawNode(node, index);
      });
    }

    // Hit detection - find node at screen coordinates
    function findNodeAt(screenX, screenY) {
      const world = screenToWorld(screenX, screenY);
      
      for (let i = 0; i < graphData.nodes.length; i++) {
        const node = graphData.nodes[i];
        const pos = getNodePosition(node, i);
        const dx = world.x - pos.x;
        const dy = world.y - pos.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance <= HIT_RADIUS) {
          return node;
        }
      }
      return null;
    }

    // Format relative date
    function formatRelativeDate(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHour = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHour / 24);
      const diffMonth = Math.floor(diffDay / 30);
      const diffYear = Math.floor(diffDay / 365);

      if (diffYear > 0) return `${diffYear} year${diffYear > 1 ? 's' : ''} ago`;
      if (diffMonth > 0) return `${diffMonth} month${diffMonth > 1 ? 's' : ''} ago`;
      if (diffDay > 0) return `${diffDay} day${diffDay > 1 ? 's' : ''} ago`;
      if (diffHour > 0) return `${diffHour} hour${diffHour > 1 ? 's' : ''} ago`;
      if (diffMin > 0) return `${diffMin} minute${diffMin > 1 ? 's' : ''} ago`;
      return 'just now';
    }

    // Show detail panel (overlay)
    function showDetail(node) {
      selectedNode = node;
      
      document.getElementById('detail-hash').textContent = node.id;
      document.getElementById('detail-message').textContent = node.message.trim();
      document.getElementById('detail-author').textContent = node.author;
      document.getElementById('detail-date').textContent = formatRelativeDate(node.date);
      
      const filesContainer = document.getElementById('detail-files');
      filesContainer.innerHTML = '';
      
      if (node.files && node.files.length > 0) {
        node.files.forEach(file => {
          const div = document.createElement('div');
          div.className = 'text-xs text-zinc-400 py-1 px-2 bg-zinc-900 rounded truncate';
          div.textContent = file;
          div.title = file;
          filesContainer.appendChild(div);
        });
      } else {
        const div = document.createElement('div');
        div.className = 'text-xs text-zinc-500 italic';
        div.textContent = 'No files changed';
        filesContainer.appendChild(div);
      }

      panelBackdrop.classList.remove('hidden');
      detailPanel.classList.remove('translate-x-full');
      render();
    }

    // Hide detail panel
    function hideDetail() {
      selectedNode = null;
      detailPanel.classList.add('translate-x-full');
      panelBackdrop.classList.add('hidden');
      render();
    }

    // Event: Close panel button
    closeBtn.addEventListener('click', hideDetail);

    // Event: Click backdrop to close
    panelBackdrop.addEventListener('click', hideDetail);

    // Event: Canvas click
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const node = findNodeAt(x, y);
      if (node) {
        showDetail(node);
      }
    });

    // Pan state
    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;

    // Event: Mouse down (start pan)
    canvas.addEventListener('mousedown', (e) => {
      isPanning = true;
      panStartX = e.clientX;
      panStartY = e.clientY;
      canvas.style.cursor = 'grabbing';
    });

    // Event: Mouse move (pan)
    canvas.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      
      const dx = e.clientX - panStartX;
      const dy = e.clientY - panStartY;
      
      camera.x += dx / camera.scale;
      camera.y += dy / camera.scale;
      
      panStartX = e.clientX;
      panStartY = e.clientY;
      
      render();
    });

    // Event: Mouse up (end pan)
    canvas.addEventListener('mouseup', () => {
      isPanning = false;
      canvas.style.cursor = 'default';
    });

    canvas.addEventListener('mouseleave', () => {
      isPanning = false;
      canvas.style.cursor = 'default';
    });

    // Event: Wheel (zoom)
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      
      // Get world position before zoom
      const worldBefore = screenToWorld(mouseX, mouseY);
      
      // Apply zoom
      const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
      camera.scale = Math.min(camera.maxScale, Math.max(camera.minScale, camera.scale * zoomFactor));
      
      // Get world position after zoom
      const worldAfter = screenToWorld(mouseX, mouseY);
      
      // Adjust camera to keep mouse position stable
      camera.x += worldAfter.x - worldBefore.x;
      camera.y += worldAfter.y - worldBefore.y;
      
      render();
    }, { passive: false });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Escape to close panel
      if (e.key === 'Escape') {
        hideDetail();
        return;
      }

      // M to toggle messages
      if (e.key === 'm' || e.key === 'M') {
        showMessages = !showMessages;
        toggleMessagesBtn.textContent = `Messages: ${showMessages ? 'ON' : 'OFF'}`;
        render();
        return;
      }

      // Navigation with arrow keys (now horizontal, reversed direction)
      if (selectedNode && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
        e.preventDefault();
        const currentIndex = graphData.nodes.findIndex(n => n.id === selectedNode.id);
        let newIndex;
        
        // Left = newer (lower index), Right = older (higher index)
        if (e.key === 'ArrowLeft') {
          newIndex = Math.max(0, currentIndex - 1);
        } else {
          newIndex = Math.min(graphData.nodes.length - 1, currentIndex + 1);
        }
        
        if (newIndex !== currentIndex) {
          showDetail(graphData.nodes[newIndex]);
        }
      }

      // Reset view with 'r' key
      if (e.key === 'r' && !e.metaKey && !e.ctrlKey) {
        camera.x = 50;
        camera.y = 100;
        camera.scale = 1;
        render();
      }

      // Zoom with +/- keys
      if (e.key === '=' || e.key === '+') {
        camera.scale = Math.min(camera.maxScale, camera.scale * 1.2);
        render();
      }
      if (e.key === '-') {
        camera.scale = Math.max(camera.minScale, camera.scale * 0.8);
        render();
      }
    });

    // Start
    fetchGraph();
  </script>
</body>
</html>
